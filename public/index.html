<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meu Carro" />
  <meta name="description" content="Salve onde você estacionou e navegue de volta facilmente." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Onde Meu Carro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header class="app-header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">P</span>
          <span class="logo-text">Onde Meu Carro</span>
        </div>
        <div id="gps-badge" class="gps-badge waiting">
          <span class="gps-dot"></span>
          <span id="gps-label">GPS</span>
        </div>
      </div>
    </header>

    <main>

      <!-- SAVE SECTION -->
      <section class="save-section">
        <div class="coord-display" id="coord-display">
          <div class="coord-row">
            <span class="coord-label">LAT</span>
            <span class="coord-val" id="lat-val">---.------</span>
          </div>
          <div class="coord-divider"></div>
          <div class="coord-row">
            <span class="coord-label">LNG</span>
            <span class="coord-val" id="lng-val">---.------</span>
          </div>
          <div class="accuracy-row">
            <span id="acc-text">aguardando sinal...</span>
            <div class="acc-bar"><div class="acc-fill" id="acc-fill"></div></div>
          </div>
        </div>

        <div class="save-form">
          <input
            type="text"
            id="point-name"
            class="name-input"
            placeholder="Nome do ponto (ex: Vaga B4, Shopping, Show)"
            maxlength="40"
          />
          <button class="btn-save" id="btn-save" onclick="saveLocation()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            Salvar localização
          </button>
        </div>
      </section>

      <!-- LAST SAVED -->
      <section class="last-saved" id="last-saved" style="display:none">
        <div class="last-header">
          <span class="last-label">ÚLTIMO PONTO SALVO</span>
          <span class="last-time" id="last-time"></span>
        </div>
        <div class="last-name" id="last-name"></div>
        <div class="last-coords" id="last-coords"></div>
        <button class="btn-navigate" onclick="navigateTo(savedPoints[0])">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Navegar até aqui
        </button>
      </section>

      <!-- HISTORY -->
      <section class="history-section">
        <div class="history-header">
          <span class="section-title">Histórico</span>
          <span class="history-count" id="history-count">0 pontos</span>
        </div>
        <div id="history-list" class="history-list">
          <div class="empty-state">
            <div class="empty-icon">◎</div>
            <p>Nenhum ponto salvo ainda.</p>
            <p class="empty-sub">Estacione, salve e encontre seu carro sempre.</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
